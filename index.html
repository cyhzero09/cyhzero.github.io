<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>📘 同义词单词复习</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f4f9;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 650px;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.05);
            padding: 24px 18px 30px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        h1 {
            text-align: center;
            font-weight: 700;
            font-size: 1.9rem;
            color: #0f172a;
        }
        .control-row {
            display: flex;
            gap: 10px;
            background: #f8fafc;
            padding: 10px 14px;
            border-radius: 18px;
        }
        .control-row select {
            flex: 1;
            padding: 12px;
            border: 1px solid #dde4ef;
            border-radius: 14px;
            background: white;
            font-size: 0.95rem;
            outline: none;
        }
        .reset-btn {
            padding: 12px 18px;
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 16px;
            font-weight: 600;
            color: #334155;
            cursor: pointer;
            white-space: nowrap;
        }
        .mode-tabs {
            display: flex;
            gap: 8px;
        }
        .mode-btn {
            flex: 1;
            padding: 12px 6px;
            background: #eef2f6;
            border: none;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #334155;
            cursor: pointer;
            transition: 0.2s;
        }
        .mode-btn.active {
            background: #2563eb;
            color: white;
            box-shadow: 0 8px 18px rgba(37,99,235,0.25);
        }
        .progress {
            text-align: center;
            font-weight: 600;
            background: #f1f5f9;
            padding: 10px 16px;
            border-radius: 24px;
            font-size: 1rem;
        }
        .progress span {
            background: #2563eb;
            color: white;
            padding: 2px 14px;
            border-radius: 20px;
            font-weight: 700;
        }
        .question-box {
            background: #eef4ff;
            border-radius: 24px;
            padding: 26px 18px;
            text-align: center;
            font-size: 1.6rem;
            font-weight: 700;
            color: #0f172a;
            border: 2px solid #cdddfc;
            word-break: break-word;
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        @media (max-width: 450px) {
            .options-grid {
                grid-template-columns: 1fr;
            }
        }
        .option-btn {
            padding: 16px 10px;
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 18px;
            font-size: 1.05rem;
            font-weight: 600;
            color: #1e293b;
            cursor: pointer;
            transition: 0.15s;
            word-break: break-word;
        }
        .option-btn:active {
            transform: scale(0.96);
        }
        .option-btn.correct-highlight {
            background: #16a34a;
            border-color: #16a34a;
            color: white;
        }
        .option-btn.wrong-highlight {
            background: #dc2626;
            border-color: #dc2626;
            color: white;
            opacity: 0.8;
        }
        .option-btn.disabled-option {
            pointer-events: none;
            opacity: 0.6;
        }
        .next-btn-wrapper {
            display: flex;
            justify-content: center;
            margin: 8px 0 4px;
        }
        .next-btn {
            padding: 14px 40px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 24px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(37,99,235,0.3);
            transition: 0.2s;
            display: none;
        }
        .next-btn.show {
            display: inline-block;
        }
        .feedback {
            background: #f8fafc;
            border-radius: 18px;
            padding: 16px;
            text-align: center;
            color: #334155;
            font-size: 0.95rem;
            line-height: 1.6;
            min-height: 70px;
            word-break: break-word;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📘 单词复习</h1>

    <div class="control-row">
        <select id="datasetSelect"></select>
        <button class="reset-btn" id="resetModeBtn">↺ 重新开始</button>
    </div>

    <div class="mode-tabs">
        <button class="mode-btn active" data-mode="en2cn">🇬🇧→🇨🇳 英文选中文</button>
        <button class="mode-btn" data-mode="cn2en">🇨🇳→🇬🇧 中文选英文</button>
        <button class="mode-btn" data-mode="fill">📝 句子填空</button>
    </div>

    <div class="progress">
        已完成 <span id="progressCount">0/0</span>
    </div>

    <div class="question-box" id="questionText">加载中…</div>

    <div class="options-grid" id="optionsContainer">
        <button class="option-btn">-</button>
        <button class="option-btn">-</button>
        <button class="option-btn">-</button>
        <button class="option-btn">-</button>
    </div>

    <!-- 下一题按钮固定区域 -->
    <div class="next-btn-wrapper">
        <button class="next-btn" id="nextButton">▶ 下一题</button>
    </div>

    <div class="feedback" id="feedbackArea">请选择一个选项</div>
</div>

<script>
    (function() {
        // ---------- 你的额外词库文件 ----------
        const EXTRA_DATASETS = [
            // { name: '进阶词汇', file: 'advanced.json' }
            // 在这里添加更多文件
        ];

        // 默认词库
        const DEFAULT_WORDS = [
            { word: "expand", synonyms: ["amplify"], meaning: "放大", sentence: "You need to expand your vocabulary to speak better.", translation: "你需要擴大詞彙量才能說得更好。" },
            { word: "accomplish", synonyms: ["achieve"], meaning: "完成", sentence: "She worked hard to accomplish her goal.", translation: "她努力工作以完成她的目標。" },
            { word: "acquire", synonyms: ["obtain"], meaning: "获得", sentence: "I want to acquire new skills for my job.", translation: "我想為我的工作獲得新技能。" },
            { word: "advocate", synonyms: ["champion"], meaning: "擁護", sentence: "He advocates for better schools in the city.", translation: "他擁護在城市裡建立更好的學校。" },
            { word: "alleviate", synonyms: ["mitigate"], meaning: "緩解", sentence: "This medicine will alleviate the pain.", translation: "這種藥會緩解疼痛。" },
            { word: "analyze", synonyms: ["scrutinize"], meaning: "分析", sentence: "We need to analyze the problem carefully.", translation: "我們需要仔細分析這個問題。" },
            { word: "anticipate", synonyms: ["foresee"], meaning: "預見", sentence: "I anticipate that the weather will be nice tomorrow.", translation: "我預見明天天氣會很好。" },
            { word: "apprehend", synonyms: ["comprehend"], meaning: "理解", sentence: "She couldn't apprehend the complex instructions.", translation: "她無法理解那些複雜的指示。" },
            { word: "artificial", synonyms: ["synthetic"], meaning: "人造的", sentence: "This flower is artificial, not real.", translation: "這朵花是人造的，不是真的。" },
            { word: "ascertain", synonyms: ["determine"], meaning: "確定", sentence: "Can you ascertain the truth of the story?", translation: "你能確定這個故事的真實性嗎？" },
            { word: "assemble", synonyms: ["compile"], meaning: "集合", sentence: "Let's assemble all the data for the report.", translation: "讓我們集合所有報告的數據。" },
            { word: "assess", synonyms: ["evaluate"], meaning: "評估", sentence: "The teacher will assess our presentations.", translation: "老師會評估我們的簡報。" },
            { word: "assimilate", synonyms: ["integrate"], meaning: "同化", sentence: "It takes time to assimilate into a new culture.", translation: "融入新文化需要時間同化。" },
            { word: "augment", synonyms: ["enhance"], meaning: "增強", sentence: "Reading can augment your knowledge.", translation: "閱讀可以增強你的知識。" },
            { word: "authentic", synonyms: ["genuine"], meaning: "真實的", sentence: "This is an authentic Chinese dish.", translation: "這是一道真實的中國菜。" },
            { word: "autonomous", synonyms: ["independent"], meaning: "自治的", sentence: "The region became autonomous last year.", translation: "這個地區去年開始自治了。" },
            { word: "bewildered", synonyms: ["perplexed"], meaning: "迷惑的", sentence: "I was bewildered by the map.", translation: "我對這張地圖感到迷惑。" },
            { word: "blunt", synonyms: ["dull"], meaning: "遲鈍的", sentence: "This knife is too blunt to cut vegetables.", translation: "這把刀太鈍了，沒辦法切菜。" },
            { word: "bolster", synonyms: ["reinforce"], meaning: "加強", sentence: "We need to bolster the team with new players.", translation: "我們需要通過新球員來加強隊伍。" },
            { word: "brainstorm", synonyms: ["contemplate"], meaning: "極力思考", sentence: "Let's brainstorm ideas for the party.", translation: "讓我們極力思考派對的點子。" },
            { word: "breach", synonyms: ["violate"], meaning: "違反", sentence: "He breached the contract by being late.", translation: "他因遲到而違反了合約。" },
            { word: "burgeon", synonyms: ["flourish"], meaning: "迅速發展", sentence: "The small town began to burgeon into a city.", translation: "這個小鎮開始迅速發展成一個城市。" },
            { word: "cease", synonyms: ["terminate"], meaning: "停止", sentence: "The company will cease operations next month.", translation: "這家公司下個月將停止營運。" },
            { word: "circumvent", synonyms: ["bypass"], meaning: "避免", sentence: "He tried to circumvent the traffic jam.", translation: "他試圖避開交通堵塞。" },
            { word: "coherent", synonyms: ["cohesive"], meaning: "連貫的", sentence: "Her speech was clear and coherent.", translation: "她的演講清晰且連貫。" },
            { word: "collaborate", synonyms: ["cooperate"], meaning: "合作", sentence: "We will collaborate on this project.", translation: "我們將在這個專案上合作。" },
            { word: "commendable", synonyms: ["praiseworthy"], meaning: "值得稱讚的", sentence: "Your hard work is commendable.", translation: "你的努力工作是值得稱讚的。" },
            { word: "compensate", synonyms: ["recompense"], meaning: "補償", sentence: "The company will compensate you for your loss.", translation: "公司會補償你的損失。" },
            { word: "complement", synonyms: ["enhance"], meaning: "補充", sentence: "This wine complements the food perfectly.", translation: "這款酒完美地補充了這道菜。" },
            { word: "comprehensive", synonyms: ["exhaustive"], meaning: "全面的", sentence: "The guide provides comprehensive information.", translation: "這本指南提供了全面的資訊。" },
            { word: "comprise", synonyms: ["consist of"], meaning: "包括", sentence: "The team comprises five people.", translation: "這個團隊包括五個人。" },
            { word: "conceive", synonyms: ["conceptualize"], meaning: "構思", sentence: "She conceived a brilliant plan.", translation: "她構思了一個絕妙的計劃。" },
            { word: "concise", synonyms: ["succinct"], meaning: "簡潔的", sentence: "Please give a concise summary.", translation: "請給一個簡潔的總結。" },
            { word: "confront", synonyms: ["encounter"], meaning: "面臨", sentence: "We must confront the challenges ahead.", translation: "我們必須面臨前方的挑戰。" },
            { word: "congruent", synonyms: ["compatible"], meaning: "一致的", sentence: "Their goals are congruent with ours.", translation: "他們的目標和我們是一致的。" },
            { word: "considerable", synonyms: ["substantial"], meaning: "相當大的", sentence: "He has considerable experience in teaching.", translation: "他有相當大的教學經驗。" },
            { word: "consistent", synonyms: ["coherent"], meaning: "一致的", sentence: "His actions are consistent with his words.", translation: "他的行動和他的話語是一致的。" },
            { word: "contemplate", synonyms: ["ponder"], meaning: "沉思", sentence: "She sat alone, contemplating the problem.", translation: "她獨自坐著，沉思這個問題。" },
            { word: "contradict", synonyms: ["negate"], meaning: "矛盾", sentence: "His statement contradicts the facts.", translation: "他的陳述與事實矛盾。" },
            { word: "conventional", synonyms: ["orthodox"], meaning: "傳統的", sentence: "They had a conventional wedding.", translation: "他們舉辦了一場傳統的婚禮。" }
        ];

        let currentWords = [...DEFAULT_WORDS];
        let currentMode = 'en2cn';
        let modeRemaining = {
            en2cn: [],
            cn2en: [],
            fill: []
        };
        let currentQuestion = null;
        let answeredWrong = new Set();
        let isQuestionSolved = false;   // 当前题是否已答对（等待点击下一题）

        const qText = document.getElementById('questionText');
        const optionsContainer = document.getElementById('optionsContainer');
        const feedbackArea = document.getElementById('feedbackArea');
        const progressCount = document.getElementById('progressCount');
        const modeBtns = document.querySelectorAll('.mode-btn');
        const resetBtn = document.getElementById('resetModeBtn');
        const datasetSelect = document.getElementById('datasetSelect');
        const nextButton = document.getElementById('nextButton');

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function getRemaining() {
            return modeRemaining[currentMode];
        }

        function hideNextButton() {
            nextButton.classList.remove('show');
        }

        function showNextButton() {
            nextButton.classList.add('show');
        }

        function updateProgress() {
            const total = currentWords.length;
            const done = total - getRemaining().length;
            progressCount.textContent = `${done}/${total}`;
        }

        function resetCurrentMode() {
            modeRemaining[currentMode] = currentWords.map((_, idx) => idx);
            shuffleArray(modeRemaining[currentMode]);
            clearQuestionState();
            if (getRemaining().length > 0) {
                loadNextQuestion();
            } else {
                showFinished();
            }
            updateProgress();
        }

        function clearQuestionState() {
            currentQuestion = null;
            answeredWrong.clear();
            isQuestionSolved = false;
            hideNextButton();
        }

        function getRandomDistractors(correctIdx, count, excludeSynonyms = []) {
            const allIndices = currentWords.map((_, i) => i);
            const correctWord = currentWords[correctIdx];
            const forbidden = new Set([correctWord.word, ...correctWord.synonyms, ...excludeSynonyms]);
            const pool = allIndices.filter(i => {
                if (i === correctIdx) return false;
                const w = currentWords[i];
                if (forbidden.has(w.word)) return false;
                if (w.synonyms.some(s => forbidden.has(s))) return false;
                return true;
            });
            return shuffleArray([...pool]).slice(0, count);
        }

        function generateQuestion(wordIndex) {
            const wordObj = currentWords[wordIndex];
            let questionText = '', correctAnswer = '', options = [];

            if (currentMode === 'en2cn') {
                questionText = wordObj.word;
                correctAnswer = wordObj.meaning;
                const dIdx = getRandomDistractors(wordIndex, 3, []);
                options = [correctAnswer, ...dIdx.map(i => currentWords[i].meaning)];
            } else if (currentMode === 'cn2en') {
                questionText = wordObj.meaning;
                correctAnswer = wordObj.word;
                const dIdx = getRandomDistractors(wordIndex, 3, wordObj.synonyms);
                options = [correctAnswer, ...dIdx.map(i => currentWords[i].word)];
            } else if (currentMode === 'fill') {
                if (wordObj.sentence && wordObj.sentence.trim()) {
                    const regex = new RegExp(`\\b${wordObj.word}\\b`, 'i');
                    questionText = wordObj.sentence.replace(regex, '______');
                    correctAnswer = wordObj.word;
                    const dIdx = getRandomDistractors(wordIndex, 3, wordObj.synonyms);
                    options = [correctAnswer, ...dIdx.map(i => currentWords[i].word)];
                } else {
                    questionText = `(无句子) ${wordObj.word}`;
                    correctAnswer = wordObj.meaning;
                    const dIdx = getRandomDistractors(wordIndex, 3, []);
                    options = [correctAnswer, ...dIdx.map(i => currentWords[i].meaning)];
                }
            }
            return { wordIndex, questionText, options: shuffleArray([...options]), correctAnswer, wordObj };
        }

        function loadNextQuestion() {
            const remaining = getRemaining();
            if (remaining.length === 0) {
                showFinished();
                return;
            }
            const randomPos = Math.floor(Math.random() * remaining.length);
            const wordIndex = remaining[randomPos];
            currentQuestion = generateQuestion(wordIndex);
            answeredWrong.clear();
            isQuestionSolved = false;
            hideNextButton();
            renderQuestion(currentQuestion);
            updateProgress();
        }

        function renderQuestion(q) {
            qText.textContent = q.questionText;
            optionsContainer.innerHTML = '';
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.addEventListener('click', () => handleOptionClick(opt, btn));
                optionsContainer.appendChild(btn);
            });
            feedbackArea.innerHTML = '请选择一个选项';
        }

        function handleOptionClick(selected, clickedBtn) {
            if (!currentQuestion || isQuestionSolved) return;
            if (answeredWrong.has(selected)) return;

            const correctAnswer = currentQuestion.correctAnswer;
            if (selected === correctAnswer) {
                // 答对
                isQuestionSolved = true;
                const allBtns = document.querySelectorAll('.option-btn');
                allBtns.forEach(btn => {
                    btn.classList.add('disabled-option');
                    if (btn.textContent === correctAnswer) {
                        btn.classList.add('correct-highlight');
                    }
                });
                // 显示句子对照
                const obj = currentQuestion.wordObj;
                let msg = '✅ <strong>正确！</strong><br>';
                if (obj.sentence && obj.translation) {
                    msg += `📖 ${obj.sentence}<br>💬 ${obj.translation}`;
                } else if (obj.sentence) {
                    msg += `📖 ${obj.sentence}`;
                }
                feedbackArea.innerHTML = msg;
                // 从剩余列表中删除该单词
                const remaining = getRemaining();
                const idxPos = remaining.indexOf(currentQuestion.wordIndex);
                if (idxPos > -1) remaining.splice(idxPos, 1);
                updateProgress();
                // 显示下一题按钮
                showNextButton();
            } else {
                // 答错：标红，禁止再次点击
                answeredWrong.add(selected);
                clickedBtn.classList.add('wrong-highlight');
                clickedBtn.classList.add('disabled-option');
                feedbackArea.innerHTML = '❌ 选错了，再试一次～';
            }
        }

        function showFinished() {
            qText.textContent = '🎉 全部完成！';
            optionsContainer.innerHTML = '';
            feedbackArea.innerHTML = '太棒了！点击“重新开始”继续巩固。';
            progressCount.textContent = `${currentWords.length}/${currentWords.length}`;
            hideNextButton();
            currentQuestion = null;
            isQuestionSolved = false;
        }

        // 下一题按钮点击
        nextButton.addEventListener('click', () => {
            if (!isQuestionSolved) return;
            if (getRemaining().length === 0) {
                showFinished();
            } else {
                loadNextQuestion();
            }
        });

        // 模式切换
        function switchMode(mode) {
            if (mode === currentMode) return;
            currentMode = mode;
            modeBtns.forEach(b => {
                b.classList.toggle('active', b.dataset.mode === mode);
            });
            clearQuestionState();
            if (getRemaining().length > 0) {
                loadNextQuestion();
            } else {
                showFinished();
            }
            updateProgress();
        }

        modeBtns.forEach(b => b.addEventListener('click', () => switchMode(b.dataset.mode)));

        // 重置按钮
        resetBtn.addEventListener('click', () => {
            resetCurrentMode();
        });

        // 词库加载
        async function fetchJSON(file) {
            const resp = await fetch(file);
            if (!resp.ok) throw new Error(`加载失败 ${file}`);
            return await resp.json();
        }

        async function loadDataset(identifier) {
            let wordsArray = [];
            if (identifier === 'default') {
                wordsArray = [...DEFAULT_WORDS];
            } else if (identifier === 'all') {
                const all = [...DEFAULT_WORDS];
                for (let ds of EXTRA_DATASETS) {
                    try {
                        const extra = await fetchJSON(ds.file);
                        all.push(...extra);
                    } catch (e) {
                        console.warn(e);
                    }
                }
                const seen = new Set();
                wordsArray = all.filter(w => {
                    if (seen.has(w.word)) return false;
                    seen.add(w.word);
                    return true;
                });
            } else {
                wordsArray = await fetchJSON(identifier);
            }
            currentWords = wordsArray;
            ['en2cn', 'cn2en', 'fill'].forEach(m => {
                modeRemaining[m] = currentWords.map((_, i) => i);
                shuffleArray(modeRemaining[m]);
            });
            clearQuestionState();
            if (getRemaining().length > 0) {
                loadNextQuestion();
            } else {
                showFinished();
            }
            updateProgress();
        }

        function buildSelect() {
            datasetSelect.innerHTML = '';
            const optDefault = new Option('📗 P.1-2', 'default');
            const optAll = new Option('📚 全部词库（合并）', 'all');
            datasetSelect.appendChild(optDefault);
            datasetSelect.appendChild(optAll);
            EXTRA_DATASETS.forEach((ds, i) => {
                datasetSelect.appendChild(new Option(`📄 ${ds.name || '词库'+(i+1)}`, ds.file));
            });
        }

        datasetSelect.addEventListener('change', async (e) => {
            try {
                await loadDataset(e.target.value);
            } catch (err) {
                alert('加载失败：' + err.message);
                datasetSelect.value = 'default';
                await loadDataset('default');
            }
        });

        // 初始化
        (async function init() {
            buildSelect();
            try {
                await loadDataset('default');
            } catch {
                currentWords = [...DEFAULT_WORDS];
                resetCurrentMode();
            }
        })();
    })();
</script>
</body>
</html>
